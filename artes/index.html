<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria da Equipa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .card a {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Galeria</h1>

    <div class="galeria">

        <div class="card">
            <img src="francisco.png" alt="Francisco">
            <a href="francisco.png">Francisco</a>
        </div>

        <div class="card">
            <img src="tomas.png" alt="Tomás">
            <a href="tomas.png">Tomás</a>
        </div>

        <div class="card">
            <img src="andre.png" alt="André">
            <a href="andre.png">André</a>
        </div>

        <div class="card">
            <img src="guilherme.png" alt="Guilherme">
            <a href="guilherme.png">Guilherme</a>
        </div>

        <div class="card">
            <img src="afonso.png" alt="Afonso">
            <a href="afonso.png">Afonso</a>
        </div>

        <div class="card">
            <img src="jose.png" alt="José">
            <a href="jose.png">José</a>
        </div>

        <div class="card">
            <img src="pacos.png" alt="Paços">
            <a href="pacos.png">Paços</a>
        </div>

        <div class="card">
            <img src="pedro.png" alt="Pedro">
            <a href="pedro.png">Pedro</a>
        </div>

        <div class="card">
            <img src="simao.png" alt="Simão">
            <a href="simao.png">Simão</a>
        </div>

        <div class="card">
            <img src="diogo.png" alt="Diego">
            <a href="diogo">diogo</a>
        </div>

        <div class="card">
            <img src="manuel.png" alt="Manuel">
            <a href="manuel.png">Manuel</a>
        </div>

        <div class="card">
            <img src="samuel.png" alt="Samuel">
            <a href="samuel.png">Samuel</a>
        </div>

    </div>

</body>
</html>
